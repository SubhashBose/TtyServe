<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<script>
  // The app uses relative URLs, so its path must end in "/". Behind
  // prefix-stripping proxies (e.g. /code/proxy/7681) the server can't see
  // the original path and cannot redirect — normalize here, before any
  // asset is requested. Direct access at "/" is a no-op.
  if (!location.pathname.endsWith("/")) {
    location.replace(location.pathname + "/" + location.search + location.hash);
  }
</script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{.Title}}</title>
<link rel="icon" href="{{.Favicon}}" />
<link rel="stylesheet" href="static/xterm.css?v={{.V}}" />
<style>
  :root {
    --bg: #1e1e1e;
    --bar-bg: #252526;
    --tab-bg: #2d2d2d;
    --tab-active: #1e1e1e;
    --tab-border: #3c3c3c;
    --fg: #cccccc;
    --accent: #0e639c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
  #app { display: flex; height: 100%; }
  #app.bar-top { flex-direction: column; }
  #app.bar-right { flex-direction: row-reverse; }

  #tabbar { background: var(--bar-bg); display: flex; gap: 2px; padding: 4px;
    overflow: auto; }
  #app.bar-top #tabbar { flex-direction: row; align-items: center;
    border-bottom: 1px solid var(--tab-border); }
  #app.bar-right #tabbar { flex-direction: column; width: 180px;
    border-left: 1px solid var(--tab-border); }
  #app.hide-tabs #tabbar { display: none; }

  .tab { background: var(--tab-bg); border: 1px solid var(--tab-border);
    border-radius: 4px; padding: 5px 10px; cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 6px; font-size: 13px; user-select: none; }
  .tab.active { background: var(--tab-active); border-color: var(--accent); }
  .tab.dragging { opacity: .5; }
  .tab::before { content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: #4ec9b0; flex: none; }
  .tab.disconnected::before { background: #f48771; }
  .tab .title { outline: none; }
  .tab .title .dir { color: #8c8c8c; }
  .tab.active .title .dir { color: #9f9f9f; }
  .icon { width: 13px; height: 13px; display: block; flex: none; }
  .tab .badge { flex: none; display: flex; align-items: center;
    color: #7fb2ff; }
  .tab .badge:empty { display: none; }
  .tab .badge .icon, .tab .pinicon .icon { width: 11px; height: 11px; }
  .tab .pinicon { flex: none; display: flex; align-items: center;
    color: #b8b8b8; }
  .tab.is-shared { border-color: #4e7ec9; }

  .ctxmenu { position: fixed; z-index: 100; background: var(--bar-bg);
    border: 1px solid var(--tab-border); border-radius: 6px; padding: 4px;
    min-width: 180px; box-shadow: 0 6px 20px rgba(0,0,0,.45); font-size: 13px; }
  .ctxitem { padding: 6px 12px; border-radius: 4px; cursor: pointer;
    white-space: nowrap; color: var(--fg);
    display: flex; align-items: center; gap: 9px; }
  .ctxitem .icon { opacity: .75; }
  .ctxitem:hover { background: var(--accent); color: #fff; }
  .ctxitem:hover .icon { opacity: 1; }

  .modal-overlay { position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.55); display: flex; align-items: center;
    justify-content: center; }
  .modal { background: var(--bar-bg); border: 1px solid var(--tab-border);
    border-radius: 8px; padding: 20px; width: 420px; max-width: calc(100vw - 32px);
    box-shadow: 0 10px 40px rgba(0,0,0,.5); color: var(--fg); }
  .modal-title { margin: 0 0 4px; font-size: 16px; font-weight: 600; }
  .modal-sub { margin: 0 0 14px; font-size: 12px; color: #9a9a9a; }
  .modal .field { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  .modal .field > label { width: 96px; flex: none; font-size: 13px; color: #bcbcbc; }
  .modal .field.checkbox { align-items: flex-start; }
  .modal .field.checkbox > input { flex: none; width: auto; margin-top: 2px; accent-color: var(--accent); }
  .modal .field.checkbox > label { width: auto; flex: 1; cursor: pointer; line-height: 1.4; }
  .modal select, .modal input { flex: 1; background: var(--bg); color: var(--fg);
    border: 1px solid var(--tab-border); border-radius: 5px; padding: 6px 8px;
    font-size: 13px; font-family: inherit; }
  .modal .result input { font-family: Menlo, Consolas, monospace; font-size: 12px; }
  .modal-hint { margin: 4px 0 0; font-size: 11px; color: #7c7c7c; line-height: 1.4; }
  .modal-actions { display: flex; align-items: center; gap: 8px; margin-top: 18px; }
  .btn { background: var(--tab-bg); color: var(--fg); border: 1px solid var(--tab-border);
    border-radius: 5px; padding: 6px 14px; font-size: 13px; cursor: pointer;
    font-family: inherit; }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.12); }
  .btn-primary:disabled { opacity: .6; cursor: default; }
  .btn-danger:hover { border-color: #f48771; color: #f48771; }
  .tab .title[contenteditable="true"] { user-select: text; cursor: text; }
  .tab .close { opacity: .6; font-weight: bold; padding: 0 2px; }
  .tab .close:hover { opacity: 1; color: #f48771; }
  #newtab { background: transparent; color: var(--fg); border: 1px dashed var(--tab-border);
    border-radius: 4px; cursor: pointer; padding: 5px 10px; font-size: 13px; }
  #newtab:hover { border-color: var(--accent); }

  #terminals { position: relative; flex: 1; min-height: 0; min-width: 0; }
  .term-pane { position: absolute; inset: 0; display: none; background: var(--bg); }
  .term-pane.active { display: block; }
  /* Physically inset the terminal from the pane edges for breathing room,
     with a bit more at the bottom so the last line clears the rounded
     corners of an embedding frame. The fit addon measures this element, so
     the grid fits exactly inside — no reliance on CSS-padding subtraction. */
  .term-inner { position: absolute; top: 5px; left: 5px; right: 5px; bottom: 8px; }

  #status { position: absolute; bottom: 8px; right: 12px; font-size: 12px;
    background: rgba(0,0,0,.6); padding: 3px 8px; border-radius: 4px;
    pointer-events: none; opacity: 0; transition: opacity .2s; }
  #status.show { opacity: 1; }
</style>
</head>
<body>
<div id="app" class="bar-{{.TabBarPosition}}{{if not .MultiSession}} hide-tabs{{end}}">
  <div id="tabbar">
    {{if .MultiSession}}<button id="newtab" title="New terminal">+ New</button>{{end}}
  </div>
  <div id="terminals"></div>
  <div id="status"></div>
</div>

<script>
  window.TTYSERVE = {
    multiSession: {{.MultiSession}},
    tabBarPosition: "{{.TabBarPosition}}",
    readonly: {{.Readonly}},
    persistence: {{.SessionPersistence}},
    persistenceMode: "{{.PersistenceMode}}",
    fontSize: {{.FontSize}},
    graphics: {{.EnableGraphics}},
    hyperlinks: {{not .DisableHyperlink}},
    middleclickPaste: {{.MiddleclickPaste}},
    tabShowPS1: {{.TabShowPS1}},
    autoRespawn: {{.AutoRespawn}},
    allowSharing: {{.AllowSharing}},
    pingSeconds: {{.PingSeconds}},
    closeOnExit: {{.CloseOnExit}},
    domRenderer: {{.DOMRenderer}},
    ephemeralId: "{{.EphemeralID}}",
    sessions: {{.Sessions}}
  };
</script>
<script src="static/xterm.js?v={{.V}}"></script>
<script src="static/xterm-addon-fit.js?v={{.V}}"></script>
{{if not .DOMRenderer}}<script src="static/xterm-addon-canvas.js?v={{.V}}"></script>
{{end}}
{{if not .DisableHyperlink}}<script src="static/xterm-addon-web-links.js?v={{.V}}"></script>
{{end}}
{{if .EnableGraphics}}<script src="static/xterm-addon-image.js?v={{.V}}"></script>
{{end}}<script src="static/app.js?v={{.V}}"></script>
</body>
</html>
