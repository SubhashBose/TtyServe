# goterm configuration. All fields are optional; defaults shown.

listen: ":7681"

# Command run for each terminal session.
command: "/bin/bash"
args: []
working_dir: ""        # empty = server's cwd
env: []                # e.g. ["FOO=bar"]

# --- Persistence ---
# When false, a session is bound to a single websocket and dies on disconnect.
session_persistence: true

# "user"       -> sessions tied to an HTTP basic-auth user, live until killed.
# "short_term" -> sessions tied to a browser cookie, reaped after idle_timeout.
persistence_mode: "short_term"

# --- Multi-session / tabs ---
multi_session: true
max_sessions_per_client: 0   # 0 = unlimited
tab_bar_position: "top"      # "top" or "right"

# --- User auth (persistence_mode: user) ---
users:
  - name: "admin"
    password: "changeme"
  # - name: "alice"
  #   password: "s3cret"
auth_realm: "goterm"

# --- Short-term sessions (persistence_mode: short_term) ---
idle_timeout: 5m             # how long a disconnected session survives
cookie_name: "goterm_session"
cookie_secure: false         # set true when serving over HTTPS

# Extra Origins allowed to open websockets (same-host is always allowed).
# Needed if you serve the UI behind a proxy on a different host. ["*"] = any.
allow_origins: []

# --- TLS (optional) ---
tls_cert_file: ""
tls_key_file: ""

# --- Behaviour (ttyd-inspired) ---
write_enabled: true          # false = read-only terminals
max_clients_per_session: 0   # 0 = unlimited shared viewers
ping_interval: 20s
scrollback_bytes: 262144     # server-side replay buffer per session
title: "goterm"
close_on_exit: true          # remove session when its shell exits
